name: ci
on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy autokalshi
      - run: pytest -q
      - run: alembic upgrade head
        env:
          AUTOKALSHI_DB_URL: "sqlite+aiosqlite:///ci.db"
